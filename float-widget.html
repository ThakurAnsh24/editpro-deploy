<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EditPro - Professional Video Editing & Poster Design</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* Floating WhatsApp Chat Button */
.whatsapp-float {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.whatsapp-float a {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    text-decoration: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
    animation: float 3s ease-in-out infinite;
}

.whatsapp-float a:hover {
    transform: scale(1.1);
}

.whatsapp-float .main-btn {
    background: #25D366;
    font-size: 32px;
}

.whatsapp-float .track-btn {
    background: var(--primary);
    font-size: 24px;
    animation-delay: 0.5s;
}

.whatsapp-float .order-btn {
    background: var(--secondary);
    font-size: 24px;
    animation-delay: 1s;
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.tooltip {
    position: absolute;
    right: 70px;
    background: #333;
    color: white;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 14px;
    white-space: nowrap;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s;
}

.whatsapp-float a:hover .tooltip {
    opacity: 1;
    visibility: visible;
}

/* Mobile Responsive */
@media (max-width: 600px) {
    .whatsapp-float {
        bottom: 20px;
        right: 20px;
    }
    
    .whatsapp-float a {
        width: 50px;
        height: 50px;
    }
    
    .whatsapp-float .main-btn {
        font-size: 26px;
    }
}
</style>
</head>
<body>

<!-- Floating WhatsApp & Track Buttons -->
<div class="whatsapp-float">
    <!-- Track Order Button -->
    <a href="track.html" class="track-btn" title="Track Order">
        🔍
        <span class="tooltip">Track Order</span>
    </a>
    
    <!-- Place Order Button -->
    <a href="order.html" class="order-btn" title="Place Order">
        📝
        <span class="tooltip">Place Order</span>
    </a>
    
    <!-- WhatsApp Chat -->
    <a href="https://wa.me/919015353021" target="_blank" class="main-btn" title="Chat on WhatsApp">
        💬
        <span class="tooltip">Chat with us</span>
    </a>
</div>

</body>
</html>
