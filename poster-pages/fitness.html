<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fitness Posters | Thakur.crea8tions</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Inter","Segoe UI",Arial,sans-serif;
    background:#0f0f0f;
    color:#fff;
}

/* ===== HEADER ===== */
header{
    padding:50px 20px 30px;
    text-align:center;
}

header h1{
    font-size:32px;
    font-weight:600;
}

header p{
    margin-top:8px;
    color:#aaa;
    font-size:15px;
}

/* ===== GALLERY ===== */
.gallery{
    max-width:1200px;
    margin:auto;
    padding:40px 20px 80px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:30px;
}

/* ===== IMAGE CARD ===== */
.poster{
    position:relative;
    overflow:hidden;
    border-radius:18px;
    background:#111;
}

.poster img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    transition:transform .5s ease;
}

/* ===== HOVER EFFECT ===== */
.poster:hover img{
    transform:scale(1.08);
}

.poster::after{
    content:"View Poster";
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.55);
    opacity:0;
    font-size:16px;
    letter-spacing:.5px;
    transition:.35s;
}

.poster:hover::after{
    opacity:1;
}

/* ===== BACK BUTTON ===== */
.back{
    position:fixed;
    bottom:25px;
    right:25px;
    background:#fff;
    color:#000;
    padding:12px 18px;
    border-radius:30px;
    text-decoration:none;
    font-weight:600;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}
</style>
</head>

<body>

<header>
    <h1>Fitness Posters</h1>
    <p>Gym • Workout • Transformation • Motivation</p>
</header>

<section class="gallery">

    <!-- POSTER 1 -->
    <div class="poster">
        <img src="../images/fitness/fit1.png" alt="Fitness Poster 1">
    </div>

    <!-- POSTER 2 -->
    <div class="poster">
        <img src="../images/fitness/fit2.png" alt="Fitness Poster 2">
    </div>

    <!-- POSTER 3 -->
    <div class="poster">
        <img src="../images/fitness/fit3.png" alt="Fitness Poster 3">
    </div>

    <!-- POSTER 4 -->
    <div class="poster">
        <img src="../images/fitness/fit4.png" alt="Fitness Poster 4">
    </div>

</section>

<a href="../poster.html" class="back">⬅ Posters</a>

</body>
</html>
