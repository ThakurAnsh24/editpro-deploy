; EditPro PHP Configuration
; This increases upload limits for video editing orders

; Increase maximum upload file size to 500MB
upload_max_filesize = 500M
post_max_size = 550M

; Increase memory limit
memory_limit = 512M

; Increase maximum execution time
max_execution_time = 300
max_input_time = 300

; Allow longer form data processing
max_input_vars = 5000

